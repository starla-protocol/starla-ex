name: core-tools-http-claim

on:
  push:
    branches:
      - main
      - implement/core-tools-http-claimant
  pull_request:
  workflow_dispatch:

jobs:
  core-tools-http-claim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout claimant
        uses: actions/checkout@v4

      - name: Checkout protocol
        uses: actions/checkout@v4
        with:
          repository: starla-protocol/starla-protocol
          path: protocol

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.2"

      - name: Install dependencies
        run: mix deps.get

      - name: Run Core Tools HTTP claim
        env:
          STARLA_PROTOCOL_DIR: ${{ github.workspace }}/protocol
        run: ./scripts/run-core-tools-http-claim.sh
